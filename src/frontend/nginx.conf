server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    types {
        application/wasm wasm;
        application/javascript js;
        text/html html;
        text/css css;
    }

    gzip on;
    gzip_types application/javascript application/wasm text/css;
}
